name: Deploy presentatie naar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Eén deploy tegelijk; nieuwe push annuleert een lopende deploy.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true        # schakelt Pages automatisch in (build via Actions)

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'               # statische site staat in de repo-root (index.html)

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
